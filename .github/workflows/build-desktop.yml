name: Build Desktop (Windows)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: clean-windows
            spec: desktop_app.spec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Django en premier (critique)
          pip install "Django>=5.1,<5.2"
          # Installation tolérante, paquet par paquet, pour qu'un seul
          # paquet défaillant n'empêche pas les autres de s'installer.
          for pkg in \
            "pymysql>=1.1.0" \
            "django-unfold" \
            "djangorestframework>=3.15.0" \
            "django-cron>=0.7.0" \
            "django-extensions>=3.2.0" \
            "openpyxl>=3.1.0" \
            "requests>=2.31.0" \
            "pywebview>=5.0.0" \
            "python-dotenv>=1.0.0" \
            "Pillow>=10.0.0" ; do
            pip install "$pkg" || echo "::warning::Échec install $pkg"
          done
          pip install pyinstaller
          python -c "import django, pymysql; print('Django', django.get_version(), '| pymysql OK')"

      - name: Generate .env from secrets
        # Le .env n'est PAS committé ; on le (re)crée à partir des secrets GitHub.
        # Les valeurs manquantes tombent sur les défauts de core/settings.py.
        shell: bash
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          ALLOWED_HOSTS=*
          SITE_ID=${{ secrets.SITE_ID }}
          CLOUD_SYNC_URL=${{ secrets.CLOUD_SYNC_URL }}
          CLOUD_API_KEY=${{ secrets.CLOUD_API_KEY }}
          CLOUD_DB_NAME=${{ secrets.CLOUD_DB_NAME }}
          CLOUD_DB_USER=${{ secrets.CLOUD_DB_USER }}
          CLOUD_DB_PASSWORD=${{ secrets.CLOUD_DB_PASSWORD }}
          CLOUD_DB_HOST=${{ secrets.CLOUD_DB_HOST }}
          CLOUD_DB_PORT=${{ secrets.CLOUD_DB_PORT }}
          OPENPAY_API_KEY=${{ secrets.OPENPAY_API_KEY }}
          OPENPAY_URL=${{ secrets.OPENPAY_URL }}
          CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
          LIVE_MODE=${{ secrets.LIVE_MODE }}
          EOF
          echo ".env généré."

      - name: Prepare build (migrate + collectstatic)
        run: python scripts/prepare_build.py

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }} --noconfirm

      - name: Import Windows code-signing certificate
        if: env.WIN_CERT_PFX != ''
        env:
          WIN_CERT_PFX: ${{ secrets.WIN_CERT_PFX }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        shell: bash
        run: |
          echo "$WIN_CERT_PFX" | base64 -d > cert.pfx
          echo "Certificat Windows importé."

      - name: Sign Windows executable (Authenticode)
        if: env.WIN_CERT_PFX != ''
        env:
          WIN_CERT_PFX: ${{ secrets.WIN_CERT_PFX }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        shell: bash
        run: |
          pip install osslsigncode
          EXE=$(find dist/desktop_app -name '*.exe' | head -n 1)
          echo "Signature de $EXE"
          osslsigncode sign \
            -pkcs12 cert.pfx \
            -pass "$WIN_CERT_PASSWORD" \
            -n "CLEAN" \
            -i "https://github.com/like2300/cleanApp" \
            -t "http://timestamp.digicert.com" \
            -in "$EXE" \
            -out "${EXE}.signed"
          mv "${EXE}.signed" "$EXE"

      - name: Package artifact (Windows)
        run: Compress-Archive -Path dist\desktop_app\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
