{% extends "base.html" %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Soumettre une Réclamation</h1>
        <p class="text-slate-500 dark:text-slate-400">Dites-nous ce qui ne va pas, nous vous répondrons dès que possible.</p>
    </div>

    <form method="POST" class="bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl p-6 space-y-6 shadow-sm">
        {% csrf_token %}
        
        <div class="space-y-2">
            <label for="subject" class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Sujet</label>
            <input type="text" name="subject" id="subject" required
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none dark:text-white"
                placeholder="Ex: Problème de paiement, Erreur de facturation...">
        </div>

        <div class="space-y-2">
            <label for="description" class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Description détaillée</label>
            <textarea name="description" id="description" rows="5" required
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none dark:text-white"
                placeholder="Décrivez votre problème en détail..."></textarea>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4">
            <a href="{% url 'reclamation_list' %}" class="px-4 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5 rounded-xl transition-all">
                Annuler
            </a>
            <button type="submit" class="bg-brand-900 text-white px-8 py-2.5 rounded-xl font-semibold hover:bg-brand-800 transition-all shadow-lg shadow-brand-900/20">
                Soumettre
            </button>
        </div>
    </form>
</div>
{% endblock %}
