<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 – Erreur serveur | Clean Desktop</title>
    <!-- NOTE: Ne pas utiliser {% load static %} ici car le 500 peut survenir avant que Django soit prêt -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0010 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
        }
        .container { text-align: center; padding: 2rem; max-width: 620px; }
        .code {
            font-size: 8rem; font-weight: 900;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; margin-bottom: 1rem;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; animation: shake 0.5s ease-in-out 1s both; }
        @keyframes shake {
            0%,100%{transform:rotate(0)} 20%{transform:rotate(-10deg)} 40%{transform:rotate(10deg)}
            60%{transform:rotate(-6deg)} 80%{transform:rotate(6deg)}
        }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { color: rgba(255,255,255,0.6); font-size: 1rem; margin-bottom: 2rem; line-height: 1.6; }
        .btn {
            display: inline-block; padding: 0.85rem 2rem;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff; text-decoration: none; border-radius: 12px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer; border: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(239,68,68,0.6); }
        .badge {
            display: inline-block; background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.35); border-radius: 50px;
            padding: 0.3rem 1rem; font-size: 0.8rem; color: #fca5a5; margin-bottom: 1.5rem;
        }
        .detail {
            margin-top: 2rem; padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔥</div>
        <div class="code">500</div>
        <div class="badge">Erreur interne du serveur</div>
        <h1>Quelque chose s'est mal passé</h1>
        <p>Le serveur a rencontré une erreur inattendue.<br>L'équipe technique a été notifiée automatiquement.</p>
        <a href="/" class="btn">← Retour au tableau de bord</a>
        <div class="detail">
            Si le problème persiste, redémarrez l'application Clean Desktop.
        </div>
    </div>
</body>
</html>
