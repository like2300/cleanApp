{% extends 'base.html' %}

{% block title %}Supprimer Employé - CLEAN{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border rounded shadow-md">
    <h1 class="text-2xl font-bold mb-4 text-red-600">Confirmer la suppression</h1>
    <p class="mb-6 text-gray-700">Êtes-vous sûr de vouloir supprimer l'employé <strong>{{ employee.first_name }} {{ employee.last_name }}</strong> ? Cette action est irréversible.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="flex justify-between">
            <a href="{% url 'employee_list' %}" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Annuler</a>
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 font-bold">Supprimer définitivement</button>
        </div>
    </form>
</div>
{% endblock %}
