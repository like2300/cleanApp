{% extends 'base.html' %}

{% block title %}{{ company.name }} | Supprimer l'utilisateur{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm dark:border-dark-border dark:bg-dark-card text-center">
        <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-red-50 text-red-600 mb-6 dark:bg-red-900/20">
            <iconify-icon icon="solar:trash-bin-trash-bold" width="40"></iconify-icon>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Supprimer l'utilisateur ?</h1>
        <p class="text-sm text-slate-500 mb-8">Voulez-vous vraiment supprimer l'utilisateur <strong>{{ user_obj.username }}</strong> ? Cette action est irréversible.</p>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <button type="submit" class="w-full rounded-xl bg-red-600 py-4 text-sm font-bold text-white shadow-lg shadow-red-600/20 hover:bg-red-700 transition-all">
                Oui, supprimer définitivement
            </button>
            <a href="{% url 'accounts:user_list' %}" class="block w-full rounded-xl border border-slate-200 py-4 text-sm font-bold text-slate-600 hover:bg-slate-50 dark:border-dark-border dark:text-slate-400 dark:hover:bg-white/5 transition-all text-center">
                Annuler
            </a>
        </form>
    </div>
</div>
{% endblock %}
